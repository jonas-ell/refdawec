<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – refdawec</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Mono',monospace;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden}
  .glitch{position:relative;font-size:8rem;font-weight:700;letter-spacing:-4px;color:#f0f0f0;animation:glitch 2s infinite}
  .glitch::before,.glitch::after{content:'404';position:absolute;top:0;left:0;width:100%}
  .glitch::before{color:#6366f1;animation:glitch-top 2s infinite;clip-path:polygon(0 0,100% 0,100% 35%,0 35%)}
  .glitch::after{color:#f87171;animation:glitch-bottom 2s infinite;clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%)}
  @keyframes glitch{0%,100%{transform:none}92%{transform:skewX(0.5deg)}}
  @keyframes glitch-top{0%,100%{transform:none;opacity:1}92%{transform:translate(-2px,-2px);opacity:0.8}}
  @keyframes glitch-bottom{0%,100%{transform:none;opacity:1}92%{transform:translate(2px,2px);opacity:0.8}}
  p{color:#555;margin:1.5rem 0 0.5rem;font-size:0.9rem;line-height:1.7}
  p span{color:#888}
  a{color:#f0f0f0;text-decoration:none;border-bottom:1px solid #333;padding-bottom:2px;font-size:0.85rem;margin-top:2rem;display:inline-block;transition:border-color 0.2s}
  a:hover{border-color:#f0f0f0}
  .dots{position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(#ffffff08 1px,transparent 1px);background-size:32px 32px}
</style>
</head>
<body>
<div class="dots"></div>
<div class="glitch">404</div>
<p><span>error:</span> page not found<br>this one doesn't exist.</p>
<a href="/">← back home</a>
</body>
</html>
